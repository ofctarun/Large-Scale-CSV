version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-exporter}:${DB_PASSWORD:-secret}@db:${DB_PORT:-5432}/${DB_NAME:-exports_db}
      - EXPORT_STORAGE_PATH=/app/exports
      - API_PORT=8080
    volumes:
      - export_data:/app/exports
    deploy:
      resources:
        limits:
          memory: 150m
    mem_limit: 150m
    memswap_limit: 150m
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-exporter}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_NAME:-exports_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./seeds:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-exporter} -d ${DB_NAME:-exports_db}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    shm_size: 256mb

volumes:
  pg_data:
  export_data:
